{% extends 'base.html' %}
{% block title %}Results{% endblock %}

{% block content %}

    <h2>Results</h2>
    <table class="table">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Marks</th>
                <th>Total Marks</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody>
            {% for result in results %}
            <tr>
                <td>{{ result.subject.name }}</td>
                <td>{{ result.marks }}</td>
                <td>{{ result.total_marks }}</td>
                <td>{{ result.grade }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
{% endblock %}
