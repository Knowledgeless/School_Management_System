{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<h2>Register</h2>
<form method="post">
    {% csrf_token %}
    {{ user_form.as_p }}
    {{ profile_form.as_p }}
    {% if profile_form.data.role == "Student" %}
        {{ student_form.as_p }}
    {% endif %}
    <button type="submit" class="btn btn-primary">Register</button>
</form>
{% endblock %}
